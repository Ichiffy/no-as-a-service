name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # Backend Go
  # ─────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Installer les dépendances
        run: go mod download

      - name: Vérifier le formatage
        run: test -z "$(gofmt -l .)"

      - name: Linter
        uses: golangci/golangci-lint-action@v9.0.0
        with:
          working-directory: backend

      - name: Tests
        run: go test ./... -v -cover

      - name: Build
        run: go build -o server ./main.go

  # ─────────────────────────────────────────
  # Frontend React
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Linter
        run: npm run lint

      - name: Tests
        run: npm run test -- --run

      - name: Build
        run: npm run build